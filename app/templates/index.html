<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Whoogle Search - Private, No Tracking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0da2e7",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header Navigation -->
<header class="flex items-center justify-between h-14 px-6 border-b border-primary/10 bg-white/50 dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="flex items-center gap-2">
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">shield_person</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Whoogle</h1>
</div>
<div class="hidden sm:flex items-center bg-primary/10 px-2 py-0.5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-xs mr-1">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Private</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-lg hover:bg-primary/10 transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">dark_mode</span>
</button>
<button class="p-2 rounded-lg hover:bg-primary/10 transition-colors text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center pt-[30vh] px-4">
<!-- Search Container -->
<div class="w-full max-w-[660px] space-y-8">
<form id="search-form" action="search" method="{{ 'get' if config.get_only else 'post' }}">
<!-- Hero Search Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
</div>
<input name="q" id="search-bar" onkeyup="handleUserInput()" autofocus="autofocus" autocomplete="off" autocapitalize="none" spellcheck="false" autocorrect="off" dir="auto" class="block w-full h-16 pl-14 pr-14 text-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full shadow-sm group-hover:shadow-md focus:shadow-lg focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all outline-none text-slate-900 dark:text-slate-100 placeholder-slate-400" placeholder="Search the web privately..." type="text"/>
<div class="absolute inset-y-0 right-0 pr-2 flex items-center gap-1">
    <select id="voice-lang" class="bg-transparent border-none text-xs text-slate-400 focus:ring-0 cursor-pointer hover:text-primary transition-colors pr-8">
        <option value="en-US">EN</option>
        <option value="hi-IN">HI</option>
        <option value="mr-IN">MR</option>
        <option value="es-ES">ES</option>
        <option value="fr-FR">FR</option>
    </select>
    <button type="button" id="mic-btn" onclick="startVoiceSearch()" class="p-2 rounded-full hover:bg-primary/10 text-slate-400 hover:text-primary transition-colors" title="Voice Search">
        <span class="material-symbols-outlined">mic</span>
    </button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-wrap justify-center gap-4 mt-8">
<button type="submit" id="search-submit" class="h-12 px-8 bg-primary hover:bg-primary/90 text-white font-semibold rounded-xl transition-all shadow-sm hover:shadow-primary/20 hover:scale-[1.02]">
                    Search
                </button>
<button type="button" onclick="document.getElementById('search-form').submit()" class="h-12 px-8 bg-slate-200/50 dark:bg-slate-800/50 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold rounded-xl transition-all border border-transparent hover:border-slate-300 dark:hover:border-slate-600">
                    I'm Feeling Lucky
                </button>
</div>
</form>

<!-- Helper Links -->
<div class="flex items-center justify-center gap-6 text-sm font-medium text-slate-500 dark:text-slate-400 mt-8">
<a class="flex items-center gap-1.5 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg">lightbulb</span>
                    Search tips
                </a>
<div class="h-4 w-px bg-slate-300 dark:bg-slate-700"></div>
<button class="flex items-center gap-1.5 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">language</span>
                    EN
                    <span class="material-symbols-outlined text-xs">expand_more</span>
</button>
<div class="h-4 w-px bg-slate-300 dark:bg-slate-700"></div>
<button class="flex items-center gap-1.5 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-lg">tune</span>
                    Advanced
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-8 flex flex-col items-center gap-4 border-t border-slate-200 dark:border-slate-800 mt-auto">
<p class="text-slate-400 dark:text-slate-500 text-sm font-medium">
            Private search — no tracking, no ads.
        </p>
<div class="flex gap-4 text-xs font-semibold text-slate-400 dark:text-slate-600 uppercase tracking-widest">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">About</a>
<span>•</span>
<a class="hover:text-primary transition-colors" href="#">API</a>
</div>
</footer>
{% if bundle_static() %}
    <script src="/{{ cb_url('bundle.js') }}" defer></script>
{% else %}
    {% if autocomplete_enabled == '1' %}
        <script src="{{ cb_url('autocomplete.js') }}"></script>
    {% endif %}
    <script src="{{ cb_url('utils.js') }}"></script>
    <script src="{{ cb_url('keyboard.js') }}"></script>
    <script src="static/js/voice_search.js"></script>
{% endif %}
</body></html>
